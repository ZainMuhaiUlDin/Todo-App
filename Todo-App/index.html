<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>

  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="header-title">
        <span class="logo-icon">✦</span>
        <h1>My Tasks</h1>
      </div>
      <p class="header-sub">Stay focused. Get things done.</p>
    </header>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-num" id="totalCount">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="activeCount">0</span>
        <span class="stat-label">Active</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="doneCount">0</span>
        <span class="stat-label">Done</span>
      </div>
    </div>

    <!-- Add Task Form -->
    <div class="add-task-card">
      <input type="text" id="taskInput" class="task-input" placeholder="What needs to be done?" maxlength="120"/>
      <div class="add-row">
        <select id="prioritySelect" class="priority-select">
          <option value="low">🟢 Low</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="high">🔴 High</option>
        </select>
        <button id="addBtn" class="add-btn" onclick="addTask()">
          <span>+ Add Task</span>
        </button>
      </div>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
      <button class="tab active" onclick="filterTasks('all', this)">All</button>
      <button class="tab" onclick="filterTasks('active', this)">Active</button>
      <button class="tab" onclick="filterTasks('completed', this)">Completed</button>
      <button class="tab tab-danger" onclick="clearCompleted()">Clear Done</button>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search tasks..." oninput="renderTasks()" />
    </div>

    <!-- Task List -->
    <div id="taskList" class="task-list"></div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">📋</div>
      <p>No tasks here yet.<br/>Add one above!</p>
    </div>

  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="modal hidden">
    <div class="modal-card">
      <h2>Edit Task</h2>
      <input type="text" id="editInput" class="task-input" maxlength="120"/>
      <select id="editPriority" class="priority-select" style="margin-top:10px; width:100%;">
        <option value="low">🟢 Low</option>
        <option value="medium">🟡 Medium</option>
        <option value="high">🔴 High</option>
      </select>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveEdit()">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
